<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>银河证券·日斗投资单元</title>
  <meta name="description" content="银河证券日斗投资单元，专注一站式证券交易、资产监控与风险管控，为专业用户提供安全、高效、规范的数字化资产管理服务。" />
  <meta property="og:title" content="银河证券·日斗投资单元" />
  <meta property="og:description" content="银河证券日斗投资单元，提供一站式证券交易、资产监控、运营管理与风险控制，助力资产安全高效运作。" />
  <meta property="og:site_name" content="银河证券日斗投资单元" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.zhengyutouzi.com" />
  <meta property="og:image" content="https://www.zhengyutouzi.com/og-preview.ico" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* 默认浅色主题变量 - 与 index.css :root 保持一致 */
    :root {
      --color-primary: #2563EB;
      --color-primary-hover: #1D4ED8;
      --color-primary-light: #DBEAFE;
      --color-accent: #DC2626;
      --color-bg: #F5F7FA;
      --color-surface: #FFFFFF;
      --color-surface-hover: #F8FAFC;
      --color-surface-active: #F1F5F9;
      --color-border: #E5E7EB;
      --color-border-light: #F3F4F6;
      --color-text-primary: #1F2937;
      --color-text-secondary: #4B5563;
      --color-text-muted: #9CA3AF;
      --color-positive: #DC2626;
      --color-negative: #059669;
    }

    html {
      background-color: var(--color-bg);
    }

    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      margin: 0;
      user-select: none;
      min-height: 100vh;
    }

    #root {
      min-height: 100vh;
      background-color: var(--color-bg);
    }
    
    .initial-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--color-bg);
      color: var(--color-text-primary);
    }
    
    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(37, 99, 235, 0.2);
      border-top-color: #2563EB;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    @keyframes slide-up {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-up {
      animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <!-- 🔴 强制清除 Service Worker 缓存 - 在应用加载前执行 -->
  <script>
    (async function() {
      if ('serviceWorker' in navigator) {
        try {
          // 注销所有 Service Worker
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var i = 0; i < regs.length; i++) {
            console.log('🗑️ [HTML] 注销 Service Worker:', regs[i].scope);
            await regs[i].unregister();
          }
          // 清除所有缓存
          var caches = await window.caches.keys();
          for (var j = 0; j < caches.length; j++) {
            console.log('🗑️ [HTML] 清除缓存:', caches[j]);
            await window.caches.delete(caches[j]);
          }
          console.log('✅ [HTML] Service Worker 缓存已清除');
        } catch(e) {
          console.error('清除缓存失败:', e);
        }
      }
    })();
  </script>
  <!-- END 强制清除 -->
  
  <div id="root">
    <div class="initial-loader">
      <div class="loader-spinner"></div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
